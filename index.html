<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz JNA - Magasins U</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="quiz-container">
    <!-- ÉCRAN D'ACCUEIL -->
    <div id="home-screen">
        <h1>🌾 Quiz JNA <br> Nos Labels de Qualité</h1>
        <p>3 questions pour tester vos connaissances et tentez de gagner un cadeau !</p>
        <button id="start-btn" class="btn btn-red">C'EST PARTI !</button>
    </div>

    <!-- ÉCRAN QUESTIONS -->
    <div id="quiz-screen" class="hidden">
        <div id="question">Chargement...</div>
        <div id="answers"></div>
        <div id="progress">Question 1 / 3</div>
    </div>

    <!-- ÉCRAN RÉSULTATS -->
    <div id="result-screen" class="hidden">
        <h1>Résultat</h1>
        <div id="final-score" class="score-final">0 / 3</div>
        <p id="result-message"></p>
        <button id="reset-btn" class="btn btn-red">RETOUR À L'ACCUEIL</button>
    </div>
</div>

    <!-- Lien vers le fichier JavaScript -->
    <script src="script.js"></script>
</body>
</html>
