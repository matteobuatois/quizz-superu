<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz JNA - Magasins U</title>
    <style>
        :root {
            --u-blue: #00569c;
            --u-red: #e30613;
            --u-white: #ffffff;
            --u-light-grey: #f4f4f4;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--u-blue);
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #quiz-container {
            background-color: var(--u-white);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: var(--u-blue); margin-bottom: 20px; font-size: 24px; }
        
        .btn {
            background-color: var(--u-light-grey);
            border: 2px solid var(--u-blue);
            border-radius: 12px;
            padding: 15px 20px;
            margin: 10px 0;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            color: var(--u-blue);
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: scale(0.98); background-color: var(--u-blue); color: white; }

        #start-btn, #reset-btn {
            background-color: var(--u-red);
            color: white;
            border: none;
            padding: 20px;
            font-size: 22px;
            margin-top: 20px;
        }

        .hidden { display: none; }

        #question { font-size: 20px; margin-bottom: 25px; font-weight: bold; min-height: 60px; }

        #progress { font-size: 14px; color: #666; margin-top: 20px; }

        .score-final { font-size: 50px; color: var(--u-red); font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- ECRAN D'ACCUEIL -->
    <div id="home-screen">
        <h1>🌾 Quiz JNA <br> Nos Labels de Qualité</h1>
        <p>3 questions pour tester vos connaissances et tenter de gagner un cadeau !</p>
        <button id="start-btn" class="btn">C'EST PARTI !</button>
    </div>

    <!-- ECRAN QUESTIONS -->
    <div id="quiz-screen" class="hidden">
        <div id="question">Chargement...</div>
        <div id="answers"></div>
        <div id="progress">Question 1 / 3</div>
    </div>

    <!-- ECRAN RESULTATS -->
    <div id="result-screen" class="hidden">
        <h1>Résultat</h1>
        <div id="final-score" class="score-final">0 / 3</div>
        <p id="result-message" style="font-size: 18px; line-height: 1.4;"></p>
        <button id="reset-btn" class="btn">RETOUR À L'ACCUEIL</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Lequel de ces labels garantit une qualité supérieure et le respect du bien-être animal ?",
            options: ["Label Rouge", "Nutriscore", "Eco-Score"],
            answer: 0
        },
        {
            q: "Que garantit le logo 'Bleu-Blanc-Cœur' dans l'alimentation des animaux ?",
            options: ["Plus de vitamines", "Des Oméga 3 naturels (Lin)", "Moins de sel"],
            answer: 1
        },
        {
            q: "Quelle est la distance maximale pour qu'un produit soit considéré 'Local' dans nos magasins ?",
            options: ["80 km", "250 km", "500 km"],
            answer: 0
        }
    ];

    let currentIdx = 0;
    let score = 0;

    const homeScreen = document.getElementById('home-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const progressEl = document.getElementById('progress');
    const finalScoreEl = document.getElementById('final-score');
    const resultMsgEl = document.getElementById('result-message');

    document.getElementById('start-btn').addEventListener('click', startQuiz);
    document.getElementById('reset-btn').addEventListener('click', startQuiz);

    function startQuiz() {
        currentIdx = 0;
        score = 0;
        homeScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const currentData = quizData[currentIdx];
        questionEl.innerText = currentData.q;
        progressEl.innerText = `Question ${currentIdx + 1} / ${quizData.length}`;
        
        answersEl.innerHTML = '';
        currentData.options.forEach((opt, index) => {
            const button = document.createElement('button');
            button.innerText = opt;
            button.classList.add('btn');
            button.onclick = () => checkAnswer(index);
            answersEl.appendChild(button);
        });
    }

    function checkAnswer(idx) {
        if (idx === quizData[currentIdx].answer) {
            score++;
        }
        
        currentIdx++;
        if (currentIdx < quizData.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        finalScoreEl.innerText = `${score} / ${quizData.length}`;
        
        if (score === 3) {
            resultMsgEl.innerText = "🏆 Score parfait ! Vous connaissez nos produits sur le bout des doigts. Allez tourner la roue !";
        } else if (score >= 1) {
            resultMsgEl.innerText = "👏 Bravo ! Vous avez de bonnes bases sur nos engagements. Tentez votre chance à la roue !";
        } else {
            resultMsgEl.innerText = "🌱 C'est l'occasion de découvrir nos producteurs locaux ! Allez quand même tourner la roue !";
        }
    }
</script>

</body>
</html>
