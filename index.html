<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz JNA - Super U</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
</head>
<body>

<div id="quiz-container">
    <div class="u-signature-bar"></div>

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="home-screen">
        <img src="https://upload.wikimedia.org/wikipedia/fr/2/2a/Super_U_logo_2009.svg" alt="Logo Super U" class="logo-u">
        <h1>Journées Nationales<br>de l'Agriculture</h1>
        <p>Testez vos connaissances sur nos engagements locaux et tentez de gagner un cadeau !</p>
        <button id="start-btn" class="btn-red massive-btn">COMMENCER LE QUIZZ</button>
    </div>

    <!-- ÉCRAN QUESTIONS -->
    <div id="quiz-screen" class="hidden">
        <div id="progress">Question 1 / 3</div>
        <div id="question">Chargement...</div>
        <div id="answers"></div>
    </div>

    <!-- ÉCRAN RÉSULTATS -->
    <div id="result-screen" class="hidden">
        <img src="https://upload.wikimedia.org/wikipedia/fr/2/2a/Super_U_logo_2009.svg" alt="Logo Super U" class="logo-u">
        <h1>Votre Résultat</h1>
        <div id="final-score" class="score-final">0 / 3</div>
        <p id="result-message"></p>
        <button id="reset-btn" class="btn-red">RETOUR À L'ACCUEIL</button>
    </div>
</div>

<!-- Ajout de la librairie pour les confettis -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
